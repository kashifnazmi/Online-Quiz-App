<!DOCTYPE html>
<html>
<head>
    <title>Edit Question</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <h1>Edit Question</h1>

    <form method="POST">
        <select name="category" required>
            <option value="{{ question[1] }}">{{ question[1] }}</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Python">Python</option>
        </select>

        <input type="text" name="question" value="{{ question[2] }}" required>
        <input type="text" name="option1" value="{{ question[3] }}" required>
        <input type="text" name="option2" value="{{ question[4] }}" required>
        <input type="text" name="option3" value="{{ question[5] }}" required>
        <input type="text" name="option4" value="{{ question[6] }}" required>
        <input type="text" name="answer" value="{{ question[7] }}" required>

        <button type="submit">Update Question</button>
    </form>

    <br>

    <a href="/admin"><button>Back</button></a>
</div>

</body>
</html>
